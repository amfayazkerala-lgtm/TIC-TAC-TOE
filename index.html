<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMK ULTRA | P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap');
        
        :root {
            --x-color: #6366f1;
            --o-color: #ec4899;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1, h2, #room-display { font-family: 'Orbitron', sans-serif; }

        .neo-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .cell {
            background: #0f172a;
            border-bottom: 4px solid #000;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            aspect-ratio: 1/1;
            transition: 0.1s;
        }

        .cell:active { border-bottom-width: 0; transform: translateY(4px); }

        .x-text { color: var(--x-color); text-shadow: 0 0 15px var(--x-color); }
        .o-text { color: var(--o-color); text-shadow: 0 0 15px var(--o-color); }

        .screen {
            display: none;
            width: 100%;
            max-width: 380px;
            flex-direction: column;
            padding: 20px;
        }

        .screen.active { display: flex; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-main {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            border-radius: 18px;
        }
    </style>
</head>

    <script>
        let peer, connection;
        let myRole = 'X'; // X for host, O for joiner
        let gameMode = 'local';
        let board = Array(9).fill(null);
        let turn = 'X';
        let winner = null;
        let scores = { X: 0, O: 0, draw: 0 };

        // INITIALIZE PEERJS
        function initPeer() {
            const randomId = Math.floor(1000 + Math.random() * 8999).toString();
            peer = new Peer(randomId);

            peer.on('open', id => {
                document.getElementById('my-peer-id').innerText = id;
            });

            // Incoming Connection
            peer.on('connection', conn => {
                connection = conn;
                myRole = 'X';
                gameMode = 'online';
                setupMessaging();
                showGame("ONLINE: X (YOU)");
            });
        }

        function connectToFriend() {
            const id = document.getElementById('friend-id-input').value;
            if(!id) return;
            connection = peer.connect(id);
            myRole = 'O';
            gameMode = 'online';
            setupMessaging();
            showGame("ONLINE: O (YOU)");
        }

        function setupMessaging() {
            connection.on('data', data => {
                if(data.type === 'move') {
                    board = data.board;
                    turn = data.turn;
                    winner = data.winner;
                    if(winner) scores[winner === 'draw' ? 'draw' : winner]++;
                    updateUI();
                } else if(data.type === 'reset') {
                    resetLogic();
                }
            });
            connection.on('open', () => console.log("Link Established"));
        }

        // GAME LOGIC
        function makeMove(i) {
            if (board[i] || winner) return;
            if (gameMode === 'online' && turn !== myRole) return;

            board[i] = turn;
            winner = checkWin(board);
            const next = turn === 'X' ? 'O' : 'X';

            if (gameMode === 'online') {
                connection.send({ type: 'move', board, turn: next, winner });
            }

            if(winner) scores[winner === 'draw' ? 'draw' : winner]++;
            turn = next;
            updateUI();
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a,b1,c] of lines) if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
            return b.every(v => v) ? 'draw' : null;
        }

        function requestReset() {
            resetLogic();
            if(gameMode === 'online' && connection) connection.send({ type: 'reset' });
        }

        function resetLogic() {
            board = Array(9).fill(null);
            turn = 'X';
            winner = null;
            updateUI();
        }

        function updateUI() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            board.forEach((val, i) => {
                const btn = document.createElement('button');
                btn.className = 'cell';
                if(val) btn.innerHTML = `<span class="${val==='X'?'x-text':'o-text'}">${val}</span>`;
                btn.onclick = () => makeMove(i);
                grid.appendChild(btn);
            });

            const status = document.getElementById('turn-display');
            if(winner) {
                status.innerText = winner === 'draw' ? "DRAW!" : `${winner} WINS!`;
                status.className = `text-xs font-black uppercase ${winner==='X'?'x-text':'o-text'}`;
            } else {
                status.innerText = (gameMode === 'online' && turn !== myRole) ? "WAITING..." : `${turn} TURN`;
                status.className = `text-xs font-black uppercase ${turn==='X'?'x-text':'o-text'}`;
            }

            document.getElementById('sx').innerText = scores.X;
            document.getElementById('so').innerText = scores.O;
            document.getElementById('sd').innerText = scores.draw;
        }

        // NAVIGATION
        function showMenu() { switchScreen('menu'); }
        function showLobby() { switchScreen('lobby'); }
        function startLocal() { gameMode = 'local'; showGame("Local 1v1"); }
        function showGame(tag) { 
            document.getElementById('role-display').innerText = tag;
            resetLogic();
            switchScreen('game'); 
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = () => {
            initPeer();
            updateUI();
            // 3-second force load for mobile
            setTimeout(() => {
                document.getElementById('loader-screen').style.display = 'none';
                showMenu();
            }, 3000);
        };
    </script>

    <div id="lobby" class="screen gap-6">
        <div class="flex items-center gap-4">
            <button onclick="switchScreen('menu')" class="p-2 neo-glass rounded-lg">Back</button>

    <!-- WAITING -->
    <div id="waiting" class="screen items-center text-center gap-8">

            <p class="text-[10px] text-indigo-400 mb-2 font-bold">ROOM CODE</p>
            <h2 id="room-code" class="text-5xl font-black tracking-widest">----</h2>
        </div>

    <!-- GAME -->
    <div id="game" class="screen gap-4">
        <div class="flex justify-between items-center neo-glass p-3 rounded-xl">
            <div class="flex flex-col">
                <p id="turn-text" class="text-xs font-bold x-glow">Turn: X</p>
                <p id="room-id-tag" class="text-[8px] text-slate-500">Local</p>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fmk-tac-v4';

        let user = null, gameMode = 'local', currentRoom = null, boardState = Array(9).fill(null);
        let turn = 'X', winner = null, scores = { X: 0, O: 0, draw: 0 }, unsubscribe = null;

        async function initAuth() {
            try {
                // Rule 3: Wait for Auth FIRST
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                user = auth.currentUser;
                
                // Connection successful
                document.getElementById('online-btn').classList.remove('btn-disabled');
                document.getElementById('net-status').innerText = 'READY';
                document.getElementById('net-status').className = 'text-[10px] text-green-500 font-bold';
                
                setTimeout(() => switchScreen('menu'), 1500);
            } catch (e) {
                console.error(e);
                document.getElementById('net-status').innerText = 'OFFLINE MODE';
                setTimeout(() => switchScreen('menu'), 1500);
            }
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'menu' && unsubscribe) { unsubscribe(); unsubscribe = null; }
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            boardState.forEach((cell, i) => {
                const btn = document.createElement('button');
                btn.className = 'tic-cell';
                if (cell === 'X') btn.innerHTML = '<span class="x-glow">X</span>';
                if (cell === 'O') btn.innerHTML = '<span class="o-glow">O</span>';
                btn.onclick = () => makeMove(i);
                board.appendChild(btn);
            });
            const status = document.getElementById('turn-text');
            if (winner) {
                status.innerText = winner === 'draw' ? "DRAW!" : `WINNER: ${winner}`;
                status.className = `text-xs font-bold uppercase ${winner === 'X' ? 'x-glow' : 'o-glow'}`;
            } else {
                status.innerText = `Turn: ${turn}`;
                status.className = `text-xs font-bold uppercase ${turn === 'X' ? 'x-glow' : 'o-glow'}`;
            }
        }

        async function makeMove(i) {
            if (boardState[i] || winner || !user) return;
            
            if (gameMode === 'online') {
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom);
                const snap = await roomRef.get();
                const d = snap.data();
                const mySymbol = d.players.X === user.uid ? 'X' : 'O';
                if (d.turn !== mySymbol || d.status !== 'playing') return;
            }

            boardState[i] = turn;
            const win = checkWin(boardState);
            const next = turn === 'X' ? 'O' : 'X';

            if (gameMode === 'online') {
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom);
                await roomRef.update({ board: boardState, turn: next, winner: win });
            } else {
                turn = next; winner = win;
                if(winner) { scores[winner === 'draw' ? 'draw' : winner]++; updateScores(); }
                renderBoard();
            }
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a,b1,c] of lines) if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
            return b.every(v => v) ? 'draw' : null;
        }

        function updateScores() {
            document.getElementById('score-x').innerText = scores.X;
            document.getElementById('score-o').innerText = scores.O;
            document.getElementById('score-draws').innerText = scores.draw;
        }

        function resetGame() {
            boardState = Array(9).fill(null); turn = 'X'; winner = null;
            if (gameMode === 'online') {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom).update({ board: boardState, turn: 'X', winner: null });
            } else renderBoard();
        }

        function startLocal() { 
            gameMode = 'local'; 
            document.getElementById('room-id-tag').innerText = 'Local'; 
            resetGame(); 
            switchScreen('game'); 
        }

        async function createRoom() {
            if(!user) return;
            gameMode = 'online';
            const rid = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoom = rid;
            document.getElementById('room-code').innerText = rid;
            document.getElementById('room-id-tag').innerText = `ID: ${rid}`;
            
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(rid);
            await roomRef.set({
                board: Array(9).fill(null), turn: 'X', winner: null, players: { X: user.uid, O: null }, status: 'waiting'
            });
            
            switchScreen('waiting');
            listen(rid);
        }

        async function joinRoom() {
            if(!user) return;
            const rid = document.getElementById('join-input').value;
            if(!rid) return;
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(rid);
            const snap = await roomRef.get();
            
            if(snap.exists() && !snap.data().players.O) {
                gameMode = 'online'; currentRoom = rid;
                document.getElementById('room-id-tag').innerText = `ID: ${rid}`;
                await roomRef.update({ 'players.O': user.uid, status: 'playing' });
                switchScreen('game');
                listen(rid);
            }
        }

        function listen(rid) {
            if (unsubscribe) unsubscribe();
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(rid);
            unsubscribe = roomRef.onSnapshot(s => {
                if(!s.exists()) return;
                const d = s.data();
                boardState = d.board; turn = d.turn;
                if(d.winner && d.winner !== winner) { 
                    scores[d.winner === 'draw' ? 'draw' : d.winner]++; 
                    updateScores(); 
                }
                winner = d.winner;
                if(d.status === 'playing' && document.getElementById('waiting').classList.contains('active')) switchScreen('game');
                renderBoard();
            });
        }

        window.onload = initAuth;
    </script>
