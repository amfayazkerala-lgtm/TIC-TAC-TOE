<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic-Tac-Toe Pro | FMK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1, h2 { font-family: 'Orbitron', sans-serif; }

        .neo-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tic-cell {
            background: #0f172a;
            border-bottom: 5px solid #000;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            transition: 0.1s;
        }

        .tic-cell:active { border-bottom-width: 0; transform: translateY(4px); }

        .x-glow { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .o-glow { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }

        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid #1e293b;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .btn-disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <!-- SPLASH -->
    <div id="splash" class="screen active items-center text-center">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="var(--primary)" class="mb-6"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <h1 class="text-2xl font-black italic mb-4">FMK GAMES</h1>
        <div class="loader"></div>
    </div>

    <!-- MENU -->
    <div id="menu" class="screen gap-4">
        <h1 class="text-center text-3xl font-black x-glow mb-6 italic">BATTLE HUB</h1>
        
        <button onclick="startLocal()" class="neo-glass p-6 rounded-2xl flex items-center gap-4 active:bg-white/10">
            <div class="w-12 h-12 bg-slate-800 rounded-lg flex items-center justify-center">🤝</div>
            <div class="text-left"><h3 class="font-bold">Local 1v1</h3><p class="text-[10px] text-slate-500">Same Phone</p></div>
        </button>

        <button id="online-btn" onclick="switchScreen('lobby')" class="neo-glass p-6 rounded-2xl flex items-center gap-4 active:bg-white/10 btn-disabled">
            <div class="w-12 h-12 bg-indigo-900 rounded-lg flex items-center justify-center">🌐</div>
            <div class="text-left">
                <h3 class="font-bold">Online Match</h3>
                <p id="net-status" class="text-[10px] text-red-500 font-bold">CONNECTING...</p>
            </div>
        </button>
    </div>

    <!-- LOBBY -->
    <div id="lobby" class="screen gap-6">
        <div class="flex items-center gap-4">
            <button onclick="switchScreen('menu')" class="p-2 neo-glass rounded-lg">Back</button>
            <h2 class="text-xl font-bold">LOBBY</h2>
        </div>
        <div class="neo-glass p-6 rounded-3xl space-y-6">
            <button onclick="createRoom()" class="w-full py-4 bg-indigo-600 rounded-xl font-bold uppercase active:scale-95">Host Match</button>
            <div class="flex gap-2">
                <input id="join-input" type="number" placeholder="Enter ID" class="flex-1 bg-black rounded-xl px-4 text-center font-bold outline-none focus:border-indigo-500 h-12">
                <button onclick="joinRoom()" class="px-6 bg-white/10 rounded-xl font-bold">Join</button>
            </div>
        </div>
    </div>

    <!-- WAITING -->
    <div id="waiting" class="screen items-center text-center gap-8">
        <div class="loader"></div>
        <div class="neo-glass p-10 rounded-3xl w-full">
            <p class="text-[10px] text-indigo-400 mb-2 font-bold">ROOM CODE</p>
            <h2 id="room-code" class="text-5xl font-black tracking-widest">----</h2>
        </div>
        <button onclick="switchScreen('menu')" class="text-slate-500 font-bold text-xs uppercase underline">Cancel</button>
    </div>

    <!-- GAME -->
    <div id="game" class="screen gap-4">
        <div class="flex justify-between items-center neo-glass p-3 rounded-xl">
            <div class="flex flex-col">
                <p id="turn-text" class="text-xs font-bold x-glow">Turn: X</p>
                <p id="room-id-tag" class="text-[8px] text-slate-500">Local</p>
            </div>
            <button onclick="resetGame()" class="px-4 py-2 bg-white/5 rounded-lg text-xs">Reset</button>
        </div>
        <div id="board" class="grid grid-cols-3 gap-3 aspect-square neo-glass p-3 rounded-3xl"></div>
        <div class="grid grid-cols-3 gap-2">
            <div class="neo-glass py-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 uppercase">X</p><p id="score-x" class="font-black x-glow">0</p></div>
            <div class="neo-glass py-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 uppercase">D</p><p id="score-draws" class="font-black">0</p></div>
            <div class="neo-glass py-2 rounded-xl text-center"><p class="text-[8px] text-slate-500 uppercase">O</p><p id="score-o" class="font-black o-glow">0</p></div>
        </div>
    </div>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fmk-tac-v4';

        let user = null, gameMode = 'local', currentRoom = null, boardState = Array(9).fill(null);
        let turn = 'X', winner = null, scores = { X: 0, O: 0, draw: 0 }, unsubscribe = null;

        async function initAuth() {
            try {
                // Rule 3: Wait for Auth FIRST
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                user = auth.currentUser;
                
                // Connection successful
                document.getElementById('online-btn').classList.remove('btn-disabled');
                document.getElementById('net-status').innerText = 'READY';
                document.getElementById('net-status').className = 'text-[10px] text-green-500 font-bold';
                
                setTimeout(() => switchScreen('menu'), 1500);
            } catch (e) {
                console.error(e);
                document.getElementById('net-status').innerText = 'OFFLINE MODE';
                setTimeout(() => switchScreen('menu'), 1500);
            }
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'menu' && unsubscribe) { unsubscribe(); unsubscribe = null; }
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            boardState.forEach((cell, i) => {
                const btn = document.createElement('button');
                btn.className = 'tic-cell';
                if (cell === 'X') btn.innerHTML = '<span class="x-glow">X</span>';
                if (cell === 'O') btn.innerHTML = '<span class="o-glow">O</span>';
                btn.onclick = () => makeMove(i);
                board.appendChild(btn);
            });
            const status = document.getElementById('turn-text');
            if (winner) {
                status.innerText = winner === 'draw' ? "DRAW!" : `WINNER: ${winner}`;
                status.className = `text-xs font-bold uppercase ${winner === 'X' ? 'x-glow' : 'o-glow'}`;
            } else {
                status.innerText = `Turn: ${turn}`;
                status.className = `text-xs font-bold uppercase ${turn === 'X' ? 'x-glow' : 'o-glow'}`;
            }
        }

        async function makeMove(i) {
            if (boardState[i] || winner || !user) return;
            
            if (gameMode === 'online') {
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom);
                const snap = await roomRef.get();
                const d = snap.data();
                const mySymbol = d.players.X === user.uid ? 'X' : 'O';
                if (d.turn !== mySymbol || d.status !== 'playing') return;
            }

            boardState[i] = turn;
            const win = checkWin(boardState);
            const next = turn === 'X' ? 'O' : 'X';

            if (gameMode === 'online') {
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom);
                await roomRef.update({ board: boardState, turn: next, winner: win });
            } else {
                turn = next; winner = win;
                if(winner) { scores[winner === 'draw' ? 'draw' : winner]++; updateScores(); }
                renderBoard();
            }
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a,b1,c] of lines) if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
            return b.every(v => v) ? 'draw' : null;
        }

        function updateScores() {
            document.getElementById('score-x').innerText = scores.X;
            document.getElementById('score-o').innerText = scores.O;
            document.getElementById('score-draws').innerText = scores.draw;
        }

        function resetGame() {
            boardState = Array(9).fill(null); turn = 'X'; winner = null;
            if (gameMode === 'online') {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom).update({ board: boardState, turn: 'X', winner: null });
            } else renderBoard();
        }

        function startLocal() { 
            gameMode = 'local'; 
            document.getElementById('room-id-tag').innerText = 'Local'; 
            resetGame(); 
            switchScreen('game'); 
        }

        async function createRoom() {
            if(!user) return;
            gameMode = 'online';
            const rid = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoom = rid;
            document.getElementById('room-code').innerText = rid;
            document.getElementById('room-id-tag').innerText = `ID: ${rid}`;
            
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(rid);
            await roomRef.set({
                board: Array(9).fill(null), turn: 'X', winner: null, players: { X: user.uid, O: null }, status: 'waiting'
            });
            
            switchScreen('waiting');
            listen(rid);
        }

        async function joinRoom() {
            if(!user) return;
            const rid = document.getElementById('join-input').value;
            if(!rid) return;
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(rid);
            const snap = await roomRef.get();
            
            if(snap.exists() && !snap.data().players.O) {
                gameMode = 'online'; currentRoom = rid;
                document.getElementById('room-id-tag').innerText = `ID: ${rid}`;
                await roomRef.update({ 'players.O': user.uid, status: 'playing' });
                switchScreen('game');
                listen(rid);
            }
        }

        function listen(rid) {
            if (unsubscribe) unsubscribe();
            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(rid);
            unsubscribe = roomRef.onSnapshot(s => {
                if(!s.exists()) return;
                const d = s.data();
                boardState = d.board; turn = d.turn;
                if(d.winner && d.winner !== winner) { 
                    scores[d.winner === 'draw' ? 'draw' : d.winner]++; 
                    updateScores(); 
                }
                winner = d.winner;
                if(d.status === 'playing' && document.getElementById('waiting').classList.contains('active')) switchScreen('game');
                renderBoard();
            });
        }

        window.onload = initAuth;
    </script>
</body>
</html>
