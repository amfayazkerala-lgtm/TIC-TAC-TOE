<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Battle Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cell {
            background: #0f172a;
            box-shadow: 0 4px 0 #000;
            transition: all 0.1s;
        }

        .cell:active {
            box-shadow: 0 0px 0 #000;
            transform: translateY(4px);
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .splash-logo {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="screen active fixed inset-0 flex-col items-center justify-center bg-slate-950 z-[100]">
        <div class="splash-logo mb-6">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter">FMK GAMES</h1>
        <p class="text-[10px] text-indigo-500 font-bold tracking-[0.4em] uppercase mt-2">Initializing Battle...</p>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen w-full max-w-sm flex-col gap-10">
        <div class="text-center">
            <h1 class="text-5xl font-black italic tracking-tighter">BATTLE HUB</h1>
            <p class="text-[10px] text-indigo-500 font-bold tracking-[0.5em] uppercase">Mini Militia Style</p>
        </div>

        <div class="space-y-4">
            <button onclick="startLocal()" class="w-full p-6 glass rounded-[2rem] flex items-center gap-4 text-left hover:bg-white/5">
                <div class="p-3 bg-indigo-500/20 rounded-2xl text-indigo-400">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </div>
                <div>
                    <p class="font-black text-lg">Local Play</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">1v1 Same Device</p>
                </div>
            </button>

            <button onclick="showLobby()" class="w-full p-6 bg-indigo-600 border border-indigo-400 rounded-[2rem] flex items-center gap-4 shadow-lg shadow-indigo-600/30">
                <div class="p-3 bg-white/20 rounded-2xl text-white">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
                </div>
                <div>
                    <p class="font-black text-lg">Hotspot Room</p>
                    <p class="text-[10px] text-indigo-200 font-bold uppercase">Multiplayer Connect</p>
                </div>
            </button>
        </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen w-full max-w-sm flex-col gap-6">
        <button onclick="showHome()" class="self-start text-slate-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
        <div class="glass p-8 rounded-[2.5rem] space-y-8">
            <h2 class="text-2xl font-black italic uppercase">Multiplayer</h2>
            <div>
                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-3">Host</p>
                <button onclick="createRoom()" class="w-full py-4 bg-indigo-600 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-indigo-600/20">Create Room</button>
            </div>
            <div class="flex items-center gap-4"><div class="h-[1px] flex-1 bg-white/10"></div><span class="text-[10px] font-bold text-slate-600">OR</span><div class="h-[1px] flex-1 bg-white/10"></div></div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Join Friend</p>
                <div class="flex gap-2">
                    <input id="join-input" type="text" placeholder="ROOM ID" class="flex-1 bg-black/40 border border-white/10 rounded-xl px-5 font-bold outline-none focus:border-indigo-500">
                    <button onclick="joinRoom()" class="p-4 bg-white/10 rounded-xl hover:bg-white/20"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <!-- WAITING SCREEN -->
    <div id="waiting-screen" class="screen flex-col items-center gap-8 text-center">
        <div class="w-24 h-24 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <div class="glass p-8 rounded-[2.5rem] border-indigo-500/30">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Room ID</p>
            <h2 id="display-room-id" class="text-5xl font-black tracking-widest font-mono">0000</h2>
        </div>
        <button onclick="showHome()" class="text-slate-500 font-bold uppercase text-xs tracking-widest underline underline-offset-8">Cancel</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen w-full max-w-sm flex-col gap-8">
        <div class="flex justify-between items-center glass p-4 rounded-[2rem]">
            <button onclick="showHome()" class="text-slate-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
            <div class="text-center">
                <p id="turn-status" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Player X Turn</p>
                <p id="room-tag" class="text-[8px] font-bold text-slate-600 uppercase">Local Match</p>
            </div>
            <button onclick="resetBoard()" class="text-slate-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
        </div>

        <div id="board" class="glass p-4 rounded-[3rem] aspect-square grid grid-cols-3 gap-3">
            <!-- 9 Cells generated by JS -->
        </div>
    </div>

    <script>
        // --- Firebase Init ---
        const config = JSON.parse(__firebase_config);
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-fmk';

        let user = null;
        let gameMode = 'local'; // 'local' or 'online'
        let roomID = null;
        let boardState = Array(9).fill(null);
        let currentPlayer = 'X';
        let winner = null;
        let unsubscribe = null;

        // --- Auth Setup ---
        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }
            user = auth.currentUser;
        }

        // --- Navigation ---
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showHome() { 
            if (unsubscribe) unsubscribe();
            switchScreen('home-screen'); 
        }
        function showLobby() { switchScreen('lobby-screen'); }

        // --- Game Logic ---
        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardState.forEach((val, i) => {
                const cell = document.createElement('button');
                cell.className = 'cell rounded-[1.5rem] flex items-center justify-center text-4xl font-black';
                if (val === 'X') cell.innerHTML = '<span class="text-indigo-500">X</span>';
                if (val === 'O') cell.innerHTML = '<span class="text-pink-500">O</span>';
                cell.onclick = () => handleMove(i);
                boardEl.appendChild(cell);
            });
        }

        function checkWinner(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a,b1,c] of lines) {
                if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
            }
            return b.every(v => v) ? 'draw' : null;
        }

        async function handleMove(i) {
            if (boardState[i] || winner) return;

            if (gameMode === 'online') {
                const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomID).get();
                const data = snap.data();
                const mySymbol = data.players.X === user.uid ? 'X' : 'O';
                if (data.currentPlayer !== mySymbol) return;
            }

            boardState[i] = currentPlayer;
            winner = checkWinner(boardState);
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

            if (gameMode === 'online') {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomID).update({
                    board: boardState,
                    currentPlayer: currentPlayer,
                    winner: winner
                });
            } else {
                updateUI();
            }
        }

        function updateUI() {
            createBoard();
            const status = document.getElementById('turn-status');
            if (winner) {
                status.innerText = winner === 'draw' ? "IT'S A DRAW!" : `PLAYER ${winner} WINS!`;
                status.classList.add('text-amber-400');
            } else {
                status.innerText = `Player ${currentPlayer} Turn`;
                status.classList.remove('text-amber-400');
            }
        }

        function resetBoard() {
            boardState = Array(9).fill(null);
            currentPlayer = 'X';
            winner = null;
            if (gameMode === 'online') {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomID).update({
                    board: boardState, currentPlayer: 'X', winner: null
                });
            } else {
                updateUI();
            }
        }

        // --- Network Actions ---
        function startLocal() {
            gameMode = 'local';
            document.getElementById('room-tag').innerText = 'Local Match';
            resetBoard();
            switchScreen('game-screen');
        }

        async function createRoom() {
            gameMode = 'online';
            roomID = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('display-room-id').innerText = roomID;
            document.getElementById('room-tag').innerText = `Room: ${roomID}`;
            
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomID).set({
                board: Array(9).fill(null),
                currentPlayer: 'X',
                winner: null,
                players: { X: user.uid, O: null },
                status: 'waiting'
            });

            switchScreen('waiting-screen');
            listenToRoom();
        }

        async function joinRoom() {
            const id = document.getElementById('join-input').value;
            if (!id) return;
            const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(id);
            const snap = await ref.get();
            
            if (snap.exists() && !snap.data().players.O) {
                gameMode = 'online';
                roomID = id;
                document.getElementById('room-tag').innerText = `Room: ${id}`;
                await ref.update({ 'players.O': user.uid, status: 'playing' });
                switchScreen('game-screen');
                listenToRoom();
            }
        }

        function listenToRoom() {
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomID)
                .onSnapshot(snap => {
                    if (!snap.exists()) return;
                    const data = snap.data();
                    boardState = data.board;
                    currentPlayer = data.currentPlayer;
                    winner = data.winner;
                    
                    if (data.status === 'playing' && document.getElementById('waiting-screen').classList.contains('active')) {
                        switchScreen('game-screen');
                    }
                    updateUI();
                });
        }

        // --- Boot ---
        window.onload = async () => {
            await initAuth();
            setTimeout(() => {
                switchScreen('home-screen');
            }, 2500);
        };
    </script>
</body>
</html>
